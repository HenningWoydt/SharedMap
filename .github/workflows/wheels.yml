name: Build Wheels

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache extern dependencies
        uses: actions/cache@v4
        with:
          path: extern/local
          key: ${{ runner.os }}-${{ runner.arch }}-extern-${{ hashFiles('build.sh', 'extern/KaHIP/**', 'extern/MtKaHyPar/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-extern-

      - name: Cache cibuildwheel downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/cibuildwheel
          key: ${{ runner.os }}-${{ runner.arch }}-cibw-v1
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cibw-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_ALL_LINUX: >
            bash -lc '
            if command -v yum >/dev/null 2>&1; then
              yum install -y hwloc hwloc-devel pkgconfig;
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y hwloc hwloc-devel pkgconf-pkg-config;
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update &&
              apt-get install -y libhwloc-dev pkg-config;
            else
              echo "No supported package manager found for installing hwloc" >&2;
              exit 1;
            fi'
          CIBW_BEFORE_BUILD: ./build.sh
          CIBW_BUILD_VERBOSITY: 1
          CIBW_DEPENDENCY_VERSIONS: latest

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}