<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Glow filters for mapping groups -->
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#e74c3c" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#3498db" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#f1c40f" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle background glows -->
    <radialGradient id="bg-glow1" cx="15%" cy="30%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow2" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow3" cx="22%" cy="65%">
      <stop offset="0%" stop-color="#f1c40f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f1c40f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" rx="0" ry="0" fill="#1a1d23"/>

  <!-- Subtle background glows for graph area -->
  <ellipse cx="160" cy="180" rx="220" ry="180" fill="url(#bg-glow1)"/>
  <ellipse cx="350" cy="180" rx="200" ry="160" fill="url(#bg-glow2)"/>
  <ellipse cx="280" cy="420" rx="240" ry="150" fill="url(#bg-glow3)"/>

  <!-- ==================== TASK GRAPH (upper-left area) ==================== -->
  <!-- Label for task graph -->
  <text x="270" y="62" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#6a7080" text-anchor="middle" letter-spacing="2.5">TASKS</text>

  <!-- Red group internal edges -->
  <line x1="100" y1="130" x2="210" y2="100" stroke="#e74c3c" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="100" y1="130" x2="155" y2="210" stroke="#e74c3c" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="210" y1="100" x2="155" y2="210" stroke="#e74c3c" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- Blue group internal edges -->
  <line x1="310" y1="105" x2="420" y2="125" stroke="#3498db" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="310" y1="105" x2="365" y2="195" stroke="#3498db" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="420" y1="125" x2="365" y2="195" stroke="#3498db" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- Yellow group internal edges -->
  <line x1="230" y1="225" x2="300" y2="180" stroke="#f1c40f" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="230" y1="225" x2="285" y2="260" stroke="#f1c40f" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="300" y1="180" x2="285" y2="260" stroke="#f1c40f" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- Inter-group edges (dashed, dim) -->
  <line x1="210" y1="100" x2="310" y2="105" stroke="#888" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6,6"/>
  <line x1="155" y1="210" x2="230" y2="225" stroke="#888" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6,6"/>
  <line x1="365" y1="195" x2="300" y2="180" stroke="#888" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6,6"/>

  <!-- Task graph nodes -->
  <!-- Red group (Block 1) -->
  <circle cx="100" cy="130" r="16" fill="#e74c3c" filter="url(#glow-red)"/>
  <circle cx="210" cy="100" r="16" fill="#e74c3c" filter="url(#glow-red)"/>
  <circle cx="155" cy="210" r="16" fill="#e74c3c" filter="url(#glow-red)"/>

  <!-- Blue group (Block 2) -->
  <circle cx="310" cy="105" r="16" fill="#3498db" filter="url(#glow-blue)"/>
  <circle cx="420" cy="125" r="16" fill="#3498db" filter="url(#glow-blue)"/>
  <circle cx="365" cy="195" r="16" fill="#3498db" filter="url(#glow-blue)"/>

  <!-- Yellow group (Block 3) -->
  <circle cx="230" cy="225" r="16" fill="#f1c40f" filter="url(#glow-yellow)"/>
  <circle cx="300" cy="180" r="16" fill="#f1c40f" filter="url(#glow-yellow)"/>
  <circle cx="285" cy="260" r="16" fill="#f1c40f" filter="url(#glow-yellow)"/>

  <!-- ==================== MAPPING ARROWS ==================== -->
  <!-- Red tasks -> left processor block -->
  <path d="M100,146 C90,280 95,320 100,365" stroke="#e74c3c" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M210,116 C195,280 140,320 130,365" stroke="#e74c3c" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M155,226 C145,280 160,320 160,365" stroke="#e74c3c" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>

  <!-- Blue tasks -> right processor block -->
  <path d="M310,121 C320,280 380,320 380,365" stroke="#3498db" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M420,141 C425,280 410,320 410,365" stroke="#3498db" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M365,211 C375,280 440,320 440,365" stroke="#3498db" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>

  <!-- Yellow tasks -> middle processor block -->
  <path d="M230,241 C230,290 240,330 240,365" stroke="#f1c40f" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M300,196 C295,280 270,330 270,365" stroke="#f1c40f" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>
  <path d="M285,276 C285,300 300,330 300,365" stroke="#f1c40f" stroke-width="1.8" stroke-opacity="0.4" fill="none" stroke-dasharray="5,5"/>

  <!-- ==================== PROCESSOR HIERARCHY ==================== -->
  <!-- Level 0: Rack -->
  <rect x="55" y="365" width="430" height="32" rx="5" ry="5" fill="none" stroke="#6a7080" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="270" y="386" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6a7080" text-anchor="middle" letter-spacing="1">RACK</text>

  <!-- Hierarchy connectors (rack to nodes) -->
  <line x1="130" y1="397" x2="130" y2="412" stroke="#6a7080" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="270" y1="397" x2="270" y2="412" stroke="#6a7080" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="400" y1="397" x2="400" y2="412" stroke="#6a7080" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Level 1: Nodes -->
  <!-- Node 0 (red) -->
  <rect x="70" y="412" width="120" height="28" rx="4" ry="4" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="130" y="431" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e74c3c" fill-opacity="0.7" text-anchor="middle">Node 0</text>

  <!-- Node 1 (yellow) -->
  <rect x="210" y="412" width="120" height="28" rx="4" ry="4" fill="#f1c40f" fill-opacity="0.15" stroke="#f1c40f" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="270" y="431" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#f1c40f" fill-opacity="0.7" text-anchor="middle">Node 1</text>

  <!-- Node 2 (blue) -->
  <rect x="345" y="412" width="130" height="28" rx="4" ry="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="410" y="431" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#3498db" fill-opacity="0.7" text-anchor="middle">Node 2</text>

  <!-- Node-to-core connectors -->
  <line x1="130" y1="440" x2="95" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="130" y1="440" x2="130" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="130" y1="440" x2="165" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>

  <line x1="270" y1="440" x2="235" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="270" y1="440" x2="270" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="270" y1="440" x2="305" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>

  <line x1="410" y1="440" x2="370" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="410" y1="440" x2="410" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="410" y1="440" x2="450" y2="460" stroke="#6a7080" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Level 2: Cores -->
  <!-- Node 0 cores (red) -->
  <rect x="82" y="460" width="24" height="20" rx="3" ry="3" fill="#e74c3c" fill-opacity="0.6" filter="url(#glow-red)"/>
  <rect x="118" y="460" width="24" height="20" rx="3" ry="3" fill="#e74c3c" fill-opacity="0.6" filter="url(#glow-red)"/>
  <rect x="154" y="460" width="24" height="20" rx="3" ry="3" fill="#e74c3c" fill-opacity="0.6" filter="url(#glow-red)"/>

  <!-- Node 1 cores (yellow) -->
  <rect x="222" y="460" width="24" height="20" rx="3" ry="3" fill="#f1c40f" fill-opacity="0.6" filter="url(#glow-yellow)"/>
  <rect x="258" y="460" width="24" height="20" rx="3" ry="3" fill="#f1c40f" fill-opacity="0.6" filter="url(#glow-yellow)"/>
  <rect x="294" y="460" width="24" height="20" rx="3" ry="3" fill="#f1c40f" fill-opacity="0.6" filter="url(#glow-yellow)"/>

  <!-- Node 2 cores (blue) -->
  <rect x="358" y="460" width="24" height="20" rx="3" ry="3" fill="#3498db" fill-opacity="0.6" filter="url(#glow-blue)"/>
  <rect x="398" y="460" width="24" height="20" rx="3" ry="3" fill="#3498db" fill-opacity="0.6" filter="url(#glow-blue)"/>
  <rect x="438" y="460" width="24" height="20" rx="3" ry="3" fill="#3498db" fill-opacity="0.6" filter="url(#glow-blue)"/>

  <!-- Label for hierarchy -->
  <text x="270" y="510" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#6a7080" text-anchor="middle" letter-spacing="2.5">PROCESSORS</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="570" y1="80" x2="570" y2="560" stroke="#2a2e36" stroke-width="1.5"/>

  <!-- ==================== TEXT SECTION (right side) ==================== -->
  <!-- Title -->
  <text x="640" y="240" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="1">SharedMap</text>

  <!-- Subtitle -->
  <text x="645" y="290" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#a0a8b4" letter-spacing="0.5">Process Mapping</text>

  <!-- Tagline -->
  <text x="645" y="340" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#6a7080" letter-spacing="0.3">Shared-memory algorithm for</text>
  <text x="645" y="365" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#6a7080" letter-spacing="0.3">mapping tasks to processors</text>

  <!-- Badge: Part of KaHIP -->
  <rect x="640" y="392" width="160" height="34" rx="17" ry="17" fill="none" stroke="#3498db" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="720" y="414" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#3498db" text-anchor="middle" letter-spacing="0.5">Part of KaHIP</text>

  <!-- ==================== LEGEND ==================== -->
  <!-- Block 1 -->
  <circle cx="655" cy="475" r="8" fill="#e74c3c"/>
  <text x="672" y="480" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8890a0">Block 1</text>

  <!-- Block 2 -->
  <circle cx="775" cy="475" r="8" fill="#3498db"/>
  <text x="792" y="480" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8890a0">Block 2</text>

  <!-- Block 3 -->
  <circle cx="895" cy="475" r="8" fill="#f1c40f"/>
  <text x="912" y="480" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8890a0">Block 3</text>

  <!-- Mapping legend -->
  <line x1="648" y1="515" x2="684" y2="515" stroke="#888" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="5,5"/>
  <text x="696" y="520" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8890a0">Task-to-processor mapping</text>
</svg>